<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="theme-color" content="#dc143c">
	<meta name="description" content="Bounce Classic - A physics-based platformer game">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>Bounce Classic</title>
	<link rel="manifest" href="manifest.json">
	<style>
		#game-container {
			position: relative;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: #f5b8b8;
		}

		canvas {
			display: block;
		}

		#login-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: linear-gradient(180deg, #f5a5a5 0%, #f5b8b8 100%);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			z-index: 100;
			transition: opacity 0.5s ease;
		}

		#login-overlay.hidden {
			opacity: 0;
			pointer-events: none;
		}

		#login-overlay h1 {
			font-size: 3rem;
			margin-bottom: 1rem;
			color: #dc143c;
			text-shadow: 2px 2px 0 #8b0000, 4px 4px 0 rgba(0,0,0,0.2);
			filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
			letter-spacing: 2px;
			font-family: 'Comic Sans MS', sans-serif;
		}

		#login-overlay .subtitle {
			font-size: 1.1rem;
			color: #8b4513;
			margin-bottom: 2rem;
			text-align: center;
			max-width: 400px;
			line-height: 1.5;
			text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
			font-family: 'Comic Sans MS', sans-serif;
		}

		#g_id_onload {
			display: none;
		}

		.g_id_signin {
			border-radius: 12px !important;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2) !important;
		}

		#user-info {
			margin-top: 1.5rem;
			text-align: center;
			display: none;
			font-family: 'Comic Sans MS', sans-serif;
		}

		#user-info .profile-pic {
			width: 60px;
			height: 60px;
			border-radius: 50%;
			margin: 0 auto 0.5rem;
			display: block;
			object-fit: cover;
			border: 2px solid #ff6b8a;
		}

		#user-info .user-name {
			font-size: 1.2rem;
			font-weight: 600;
			color: #dc143c;
			text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
		}

		#user-info .user-email {
			font-size: 0.9rem;
			color: #8b4513;
		}

		#logout-btn {
			margin-top: 1rem;
			padding: 10px 24px;
			border: 2px solid #dc143c;
			background: transparent;
			color: #dc143c;
			border-radius: 20px;
			cursor: pointer;
			font-size: 0.9rem;
			transition: all 0.3s ease;
			font-weight: 600;
			font-family: 'Comic Sans MS', sans-serif;
		}

		#logout-btn:hover {
			background: #dc143c;
			color: #fff;
		}

		#enter-btn {
			margin-top: 1rem;
			padding: 12px 32px;
			border: none;
			background: linear-gradient(180deg, #ff6b8a 0%, #dc143c 100%);
			color: #fff;
			border-radius: 25px;
			cursor: pointer;
			font-size: 1rem;
			font-weight: 700;
			transition: all 0.3s ease;
			box-shadow: 0 4px 15px rgba(220, 20, 60, 0.4);
			text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
			font-family: 'Comic Sans MS', sans-serif;
		}

		#enter-btn:hover {
			transform: scale(1.05);
			box-shadow: 0 6px 20px rgba(220, 20, 60, 0.5);
		}
	</style>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
	<div id="game-container">
		<div id="login-overlay">
			<h1>BOUNCE</h1>
			<p class="subtitle">Enter a username and password to save progress.</p>
			<div style="display:flex;flex-direction:column;gap:10px;width:260px;">
				<input type="email" id="firebase-email" placeholder="Email / Gmail" style="padding:10px;border-radius:8px;border:2px solid #dc143c;font-size:16px;font-family:'Comic Sans MS',sans-serif;">
				<input type="password" id="firebase-password" placeholder="Password" style="padding:10px;border-radius:8px;border:2px solid #dc143c;font-size:16px;font-family:'Comic Sans MS',sans-serif;">
				<button id="firebase-login" style="padding:10px;border:none;background:linear-gradient(180deg,#ff6b8a,#dc143c);color:#fff;border-radius:20px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Comic Sans MS',sans-serif;">LOGIN</button>
				<button id="firebase-register" style="padding:10px;border:2px solid #dc143c;background:transparent;color:#dc143c;border-radius:20px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Comic Sans MS',sans-serif;">CREATE ACCOUNT</button>
				<button id="firebase-guest" style="padding:10px;border:2px solid #dc143c;background:transparent;color:#dc143c;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Comic Sans MS',sans-serif;">PLAY AS GUEST</button>
			</div>
			<p id="firebase-error" style="color:#8b0000;margin-top:10px;font-size:14px;font-family:'Comic Sans MS',sans-serif;display:none;"></p>
		</div>
	</div>

	<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
	<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
	<script src="js/firebase-config.js"></script>
	<script src="js/constants.js"></script>
	<script src="js/systems/SaveSystem.js"></script>
	<script src="js/systems/AudioManager.js"></script>
	<script src="js/objects/Player.js"></script>
	<script src="js/objects/Platform.js"></script>
	<script src="js/objects/Collectible.js"></script>
	<script src="js/objects/Portal.js"></script>
	<script src="js/objects/Checkpoint.js"></script>
	<script src="js/objects/Obstacles.js"></script>
	<script src="js/scenes/BootScene.js"></script>
	<script src="js/scenes/MenuScene.js"></script>
	<script src="js/scenes/LevelSelectScene.js"></script>
	<script src="js/scenes/GameScene.js"></script>
	<script src="js/scenes/VictoryScene.js"></script>
	<script src="js/scenes/GameOverScene.js"></script>
	<script src="js/scenes/ShopScene.js"></script>
	<script src="js/levels.js"></script>
	<script src="js/main.js"></script>
</body>

</html>
